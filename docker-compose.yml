version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: instory_db
    environment:
      POSTGRES_USER: instory
      POSTGRES_PASSWORD: instory_pass
      POSTGRES_DB: Instory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: