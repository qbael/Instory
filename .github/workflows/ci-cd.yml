name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Instory.slnx
      - run: dotnet build   backend/Instory.slnx --no-restore -c Release
      - run: dotnet test    backend/Instory.Tests --no-build -c Release

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  deploy:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-1

      # Frontend → S3 + CloudFront
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci && npm run build
        working-directory: frontend
      - run: aws s3 sync frontend/dist s3://${{ secrets.S3_FRONTEND_BUCKET }} --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} --paths "/*"

      # Backend → Elastic Beanstalk
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet publish backend/Instory.API/Instory.API.csproj -c Release -o ./publish
      - uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name:   instory-api
          environment_name:   instory-api-prod
          region:             ap-southeast-1
          deployment_package: publish.zip